spring.application.name=emotion-mifrations
server.port=${SERVER_PORT:8080}

app.telegram.tdlib.api-id=${TELEGRAM_API_ID:1}
app.telegram.tdlib.api-hash=${TELEGRAM_API_HASH:replace-me}
app.telegram.tdlib.phone-number=${TELEGRAM_PHONE_NUMBER:+10000000000}
app.telegram.channels[0].source-id=${TG_CHANNEL_1_ID:1001}
app.telegram.channels[0].source-name=${TG_CHANNEL_1_NAME:channel-1}
app.telegram.channels[0].vk-community-id=${VK_COMMUNITY_1_ID:2001}
app.telegram.channels[0].vk-community-name=${VK_COMMUNITY_1_NAME:community-1}
app.telegram.channels[1].source-id=${TG_CHANNEL_2_ID:1002}
app.telegram.channels[1].source-name=${TG_CHANNEL_2_NAME:channel-2}
app.telegram.channels[1].vk-community-id=${VK_COMMUNITY_2_ID:2002}
app.telegram.channels[1].vk-community-name=${VK_COMMUNITY_2_NAME:community-2}

app.vk.token=${VK_TOKEN:replace-me}
app.vk.api-version=${VK_API_VERSION:5.199}
app.vk.api-url=${VK_API_URL:https://api.vk.com/method}

app.state.file-path=${APP_STATE_FILE_PATH:./data/state-store.txt}
app.state.retention-days=${APP_STATE_RETENTION_DAYS:5}
app.state.cleanup-interval-ms=${APP_STATE_CLEANUP_INTERVAL_MS:3600000}

app.retry.max-attempts=${APP_RETRY_MAX_ATTEMPTS:3}
app.retry.initial-backoff=${APP_RETRY_INITIAL_BACKOFF:PT1S}
app.retry.multiplier=${APP_RETRY_MULTIPLIER:2.0}

app.notifications.enabled=${APP_NOTIFICATIONS_ENABLED:false}
app.notifications.bot-token=${APP_NOTIFICATIONS_BOT_TOKEN:}
app.notifications.target-chat-id=${APP_NOTIFICATIONS_TARGET_CHAT_ID:}

app.formatting.source-link-text=${APP_FORMATTING_SOURCE_LINK_TEXT:ЭмоциON}
app.events.max-in-memory-events=${APP_EVENTS_MAX_IN_MEMORY:500}
app.sync.fixed-delay-ms=${APP_SYNC_FIXED_DELAY_MS:5000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
