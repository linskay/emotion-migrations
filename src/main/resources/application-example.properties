# Telegram TDLib credentials
app.telegram.tdlib.api-id=123456
app.telegram.tdlib.api-hash=your_api_hash
app.telegram.tdlib.phone-number=+79990000000

# Mapping TG channel -> VK community
app.telegram.channels[0].source-id=-1001234567890
app.telegram.channels[0].source-name=news-main
app.telegram.channels[0].vk-community-id=12345678
app.telegram.channels[0].vk-community-name=vk-main

app.telegram.channels[1].source-id=-1009876543210
app.telegram.channels[1].source-name=news-second
app.telegram.channels[1].vk-community-id=87654321
app.telegram.channels[1].vk-community-name=vk-second

# VK API
app.vk.token=vk_service_token
app.vk.api-version=5.199
app.vk.api-url=https://api.vk.com/method

# State and retention
app.state.file-path=./data/state-store.txt
app.state.retention-days=5
app.state.cleanup-interval-ms=3600000

# Retry
app.retry.max-attempts=3
app.retry.initial-backoff=PT1S
app.retry.multiplier=2.0

# Notifications
app.notifications.enabled=true
app.notifications.bot-token=telegram_bot_token
app.notifications.target-chat-id=-1001122334455

# Formatting
app.formatting.source-link-text=ЭмоциON

# Observability
app.events.max-in-memory-events=500
app.sync.fixed-delay-ms=5000
