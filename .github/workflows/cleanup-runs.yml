name: Cleanup old runs

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 5
